<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pocket Zoo – Underwater World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #001830;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── HUD bar ──────────────────────────────────────────────────── */
  #hud {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    background: rgba(0,20,55,0.9);
    border-bottom: 2px solid #1ac9e6;
    z-index: 10;
    gap: 8px;
  }
  #coin-display {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 1.15rem;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 0 1px 4px #000;
    min-width: 70px;
  }
  .coin-icon { font-size: 1.3rem; }

  #mid-hud {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
  }
  #zone-label {
    font-size: 0.7rem;
    font-weight: bold;
    color: #1ac9e6;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-shadow: 0 0 8px rgba(26,201,230,0.7);
    white-space: nowrap;
  }
  #progress-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: #8df;
  }
  #progress-bar-bg {
    width: 90px; height: 7px;
    background: #112244;
    border-radius: 4px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1ac9e6, #00ff99);
    border-radius: 4px;
    transition: width 0.4s;
  }

  #buy-btn {
    background: linear-gradient(135deg, #1ac9e6, #0066cc);
    border: none;
    border-radius: 22px;
    padding: 7px 14px;
    font-size: 0.85rem;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,200,230,0.5);
    transition: transform 0.1s;
    white-space: nowrap;
  }
  #buy-btn:hover { transform: scale(1.06); }
  #buy-btn:active { transform: scale(0.96); }
  #buy-btn.disabled {
    background: #223;
    color: #556;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── Canvas ─────────────────────────────────────────────────────── */
  #game-wrap {
    position: relative;
    width: 100%;
    max-width: 600px;
    flex: 1;
  }
  canvas {
    display: block;
    width: 100%;
    cursor: grab;
  }
  canvas:active { cursor: grabbing; }

  /* ── Floating text ──────────────────────────────────────────────── */
  .float-text {
    position: absolute;
    pointer-events: none;
    font-weight: bold;
    font-size: 1rem;
    color: #FFD700;
    text-shadow: 0 1px 4px #000;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity:1; transform: translateY(0); }
    100% { opacity:0; transform: translateY(-52px); }
  }

  /* ── Discovery popup ────────────────────────────────────────────── */
  #popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #popup-overlay.show { display: flex; }
  #popup-box {
    background: linear-gradient(160deg, #0a2a5e, #061540);
    border: 2px solid #1ac9e6;
    border-radius: 22px;
    padding: 28px 36px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 0 50px rgba(26,201,230,0.45);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  #popup-banner {
    font-size: 0.72rem;
    color: #8df;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  #popup-zone {
    font-size: 0.72rem;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
    padding: 2px 10px;
    border-radius: 10px;
    display: inline-block;
  }
  #popup-tier {
    font-size: 0.72rem;
    color: #8df;
    margin-bottom: 8px;
  }
  #popup-name {
    font-size: 1.5rem;
    font-weight: bold;
    color: #fff;
    margin-bottom: 14px;
  }
  #popup-creature {
    width: 100px; height: 100px;
    margin: 0 auto 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.2rem;
    box-shadow: 0 0 28px rgba(26,201,230,0.5);
  }
  #popup-desc {
    font-size: 0.88rem;
    color: #acd;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  #popup-coins {
    font-size: 0.82rem;
    color: #FFD700;
    margin-bottom: 18px;
  }
  #popup-ok {
    background: linear-gradient(135deg, #1ac9e6, #0066cc);
    border: none;
    border-radius: 22px;
    padding: 9px 32px;
    font-size: 0.95rem;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,200,230,0.5);
    transition: transform 0.1s;
  }
  #popup-ok:hover  { transform: scale(1.06); }
  #popup-ok:active { transform: scale(0.96); }

  /* ── Zone unlock banner ─────────────────────────────────────────── */
  #zone-unlock-banner {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) scale(0.7);
    background: linear-gradient(135deg, rgba(0,20,60,0.95), rgba(0,5,25,0.95));
    border: 2px solid #1ac9e6;
    border-radius: 16px;
    padding: 10px 28px;
    text-align: center;
    z-index: 99;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
  }
  #zone-unlock-banner.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }
  #zone-unlock-banner .zub-title {
    font-size: 0.65rem;
    color: #1ac9e6;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #zone-unlock-banner .zub-name {
    font-size: 1.1rem;
    font-weight: bold;
    color: #fff;
  }

  /* ── Toast ──────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,15,40,0.93);
    color: #8df;
    border: 1px solid #1ac9e6;
    border-radius: 20px;
    padding: 8px 22px;
    font-size: 0.88rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
  }
  #toast.show { opacity: 1; }

  /* ── HUD buttons group ──────────────────────────────────────────── */
  #hud-buttons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  #shop-btn {
    background: linear-gradient(135deg, #ffd33d, #f5a623);
    border: none;
    border-radius: 18px;
    width: 40px; height: 36px;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(245,166,35,0.5);
    transition: transform 0.1s;
  }
  #shop-btn:hover  { transform: scale(1.08); }
  #shop-btn:active { transform: scale(0.94); }

  /* ── Marketplace modal ──────────────────────────────────────────── */
  #shop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
    align-items: center;
    justify-content: center;
  }
  #shop-overlay.show { display: flex; }

  #shop-panel {
    position: relative;
    width: 94%;
    max-width: 560px;
    max-height: 88vh;
    background:
      radial-gradient(ellipse at 50% 120%, rgba(0,80,80,0.55), transparent 60%),
      linear-gradient(160deg, #0c4a48, #073231 60%, #04201f);
    border: 3px solid #1ac9e6;
    border-radius: 24px;
    box-shadow: 0 0 50px rgba(26,201,230,0.4);
    padding: 18px 16px 20px;
    overflow: hidden;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  #shop-title {
    text-align: center;
    font-size: 1.9rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 0 3px 0 rgba(0,0,0,0.35), 0 0 16px rgba(26,201,230,0.4);
    margin-bottom: 2px;
  }
  #shop-subtitle {
    text-align: center;
    font-size: 0.68rem;
    color: #6fd4cf;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }
  #shop-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #8a7fa8, #6a5f88);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1.3rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.3);
    transition: transform 0.1s;
    z-index: 2;
  }
  #shop-close:hover  { transform: scale(1.08); }
  #shop-close:active { transform: scale(0.94) translateY(2px); }

  #shop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-height: calc(88vh - 90px);
    overflow-y: auto;
    padding: 4px;
  }
  #shop-grid::-webkit-scrollbar { width: 7px; }
  #shop-grid::-webkit-scrollbar-thumb {
    background: #1ac9e6; border-radius: 4px;
  }

  /* ── A purchasable slot ─────────────────────────────────────────── */
  .shop-slot {
    display: flex;
    align-items: stretch;
    gap: 8px;
    min-height: 92px;
  }
  /* Hexagon creature icon */
  .hex {
    flex: 0 0 76px;
    width: 76px;
    align-self: center;
    aspect-ratio: 1 / 1;
    background: linear-gradient(155deg, #ffe066, #f5a623);
    clip-path: polygon(25% 4%, 75% 4%, 100% 50%, 75% 96%, 25% 96%, 0% 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4));
  }
  /* Card on the right of the hexagon */
  .shop-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 3px 0 rgba(0,0,0,0.3);
    min-width: 0;
  }
  .shop-name {
    background: #fdfdfd;
    color: #1a3a44;
    font-weight: 800;
    font-size: 0.92rem;
    text-align: center;
    padding: 4px 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .shop-price {
    flex: 1;
    background: linear-gradient(180deg, #fff6d8, #ffe9a8);
    color: #7a5a00;
    font-weight: 800;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    transition: filter 0.1s, transform 0.1s;
  }
  .shop-slot.affordable .shop-price:hover  { filter: brightness(1.06); }
  .shop-slot.affordable .shop-price:active { transform: scale(0.97); }
  .shop-slot.cant-afford .shop-price {
    background: linear-gradient(180deg, #c9c9c9, #b0b0b0);
    color: #5a5a5a;
    cursor: not-allowed;
  }
  .shop-foot {
    background: #16524f;
    color: #bfeae6;
    font-size: 0.66rem;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    padding: 4px 8px;
  }
  .shop-foot .passive { color: #7CFC9C; }

  /* ── Locked slot ────────────────────────────────────────────────── */
  .shop-slot.locked {
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #ffd84d, #f3a51c);
    border-radius: 16px;
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.45), 0 3px 0 rgba(0,0,0,0.3);
    flex-direction: column;
    gap: 2px;
    cursor: not-allowed;
  }
  .shop-slot.locked .lock-icon { font-size: 2.1rem; filter: grayscale(0.1); }
  .shop-slot.locked .lock-req {
    font-size: 0.62rem;
    font-weight: 800;
    color: #8a5a00;
  }

  #shop-empty {
    grid-column: 1 / -1;
    text-align: center;
    color: #8fd4cf;
    padding: 32px 20px;
    font-size: 0.92rem;
    line-height: 1.65;
  }
  #shop-empty .shop-empty-icon { font-size: 2.4rem; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- ── HUD ── -->
<div id="hud">
  <div id="coin-display">
    <span class="coin-icon">🪙</span>
    <span id="coin-count">20</span>
  </div>
  <div id="mid-hud">
    <div id="zone-label">Tidal Zone</div>
    <div id="progress-wrap">
      <span id="progress-label">0/100</span>
      <div id="progress-bar-bg"><div id="progress-bar-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div id="hud-buttons">
    <button id="shop-btn" title="Buy Creatures">🛒</button>
    <button id="buy-btn">🫧 <span id="buy-cost">(10🪙)</span></button>
  </div>
</div>

<!-- ── Canvas ── -->
<div id="game-wrap">
  <canvas id="c"></canvas>
</div>

<!-- ── Discovery popup ── -->
<div id="popup-overlay">
  <div id="popup-box">
    <div id="popup-banner">✨ New Discovery!</div>
    <div id="popup-zone"></div>
    <div id="popup-tier"></div>
    <div id="popup-name"></div>
    <div id="popup-creature"></div>
    <div id="popup-desc"></div>
    <div id="popup-coins"></div>
    <button id="popup-ok">Awesome!</button>
  </div>
</div>

<!-- ── Zone unlock banner ── -->
<div id="zone-unlock-banner">
  <div class="zub-title">🌊 New Zone Unlocked!</div>
  <div class="zub-name" id="zub-name"></div>
</div>

<!-- ── Marketplace modal ── -->
<div id="shop-overlay">
  <div id="shop-panel">
    <button id="shop-close">✕</button>
    <div id="shop-title">Buy Creatures</div>
    <div id="shop-subtitle"></div>
    <div id="shop-grid"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

//  ZONE DEFINITIONS  (10 zones × 10 tiers each)
// ═══════════════════════════════════════════════════════════════════

  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';

}

//  SINKING DEBRIS  (surface → seafloor, tap for coins)
// ═══════════════════════════════════════════════════════════════════
const DEBRIS_MAX_TAPS = 5;
const DEBRIS_TYPES = [
  { name: 'Clay Pot',       emoji: '🏺', coins: 8,  r: 22, sink: 1.55 },
  { name: 'Old Wheel',      emoji: '⚙️', coins: 12, r: 24, sink: 1.65 },
  { name: 'Walking Cane',   emoji: '🦯', coins: 15, r: 20, sink: 1.50 },
  { name: 'Worn Boot',      emoji: '🥾', coins: 18, r: 21, sink: 1.58 },
  { name: 'Rusty Anchor',   emoji: '⚓', coins: 22, r: 26, sink: 1.70 },
  { name: 'Ship Wheel',     emoji: '🛞', coins: 28, r: 27, sink: 1.62 },
  { name: 'Wrecked Car',    emoji: '🚗', coins: 35, r: 30, sink: 1.48 },
  { name: 'Treasure Chest', emoji: '📦', coins: 45, r: 28, sink: 1.52 },
  { name: 'Glass Bottle',   emoji: '🍾', coins: 6,  r: 18, sink: 1.72 },
  { name: 'Rusty Pipe',     emoji: '🔩', coins: 10, r: 19, sink: 1.68 },
  { name: 'Old Lantern',    emoji: '🏮', coins: 14, r: 20, sink: 1.60 },
  { name: 'Bicycle',        emoji: '🚲', coins: 20, r: 26, sink: 1.45 },
];

function seafloorY() { return H - 26; }

function scheduleDebrisDrop() {
  debrisSpawnMs = 8000 + Math.random() * 6000; // 1–1.2 s (5× faster than 5–6 s)
}
scheduleDebrisDrop();

function spawnDebris() {
  const typeIdx = Math.floor(Math.random() * DEBRIS_TYPES.length);
  const t = DEBRIS_TYPES[typeIdx];
  const margin = t.r + 8;
  debrisList.push({
    id:       nextDebrisId++,
    typeIdx,
    x:        margin + Math.random() * (W - margin * 2),
    y:        -t.r - Math.random() * 40,
    vx:       (Math.random() - 0.5) * 0.35,
    vy:       t.sink + Math.random() * 0.25,
    r:        t.r,
    taps:     0,
    settled:  false,
    wobble:   Math.random() * Math.PI * 2,
    rot:      (Math.random() - 0.5) * 0.4,
    scale:    1,
    popLife:  0,
  });
}

function spawnDebrisWave() {
  const count = Math.random() < 0.5 ? 1 : 2; // 5× quantity (was 1–2)
  for (let i = 0; i < count; i++) spawnDebris();
  scheduleDebrisDrop();
}

function hitDebris(px, py) {
  for (let i = debrisList.length - 1; i >= 0; i--) {
    const d = debrisList[i];
    if (!d.settled) continue;
    if (Math.hypot(px - d.x, py - d.y) <= d.r * 1.15) return d;
  }
  return null;
}

function handleDebrisTap(d) {
  const t = DEBRIS_TYPES[d.typeIdx];
  coins += t.coins;
  d.taps += 1;
  d.scale = 1.28;
  d.popLife = 18;
  spawnCoinBurst(d.x, d.y - d.r * 0.3, t.coins);
  showFloat(d.x, d.y - d.r, `+${t.coins}🪙`);
  if (d.taps >= DEBRIS_MAX_TAPS) {
    debrisList = debrisList.filter(item => item !== d);
    mergeFlashes.push({ x: d.x, y: d.y, life: 22, color: '#c8a84b' });
  }
  updateHUD();
}

function spawnCoinBurst(x, y, amount) {
  coinParticles.push({
    x, y, vx: 0, vy: -2.2, life: 34, maxLife: 34,
    text: `+${amount}`, size: 16, gold: true,
  });
  for (let i = 0; i < 7; i++) {
    const ang = (Math.PI * 2 * i) / 7 + Math.random() * 0.4;
    const spd = 1.4 + Math.random() * 2.2;
    coinParticles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 1.5,
      life: 28 + Math.floor(Math.random() * 12),
      maxLife: 40,
      text: '🪙',
      size: 11 + Math.random() * 5,
      gold: false,
    });
  }
}

function updateDebris(dt) {
  debrisSpawnMs -= dt * 1000;
  if (debrisSpawnMs <= 0) spawnDebrisWave();

  const floor = seafloorY();
  for (const d of debrisList) {
    d.wobble += 0.05;
    if (!d.settled) {
      d.x += d.vx + Math.sin(d.wobble) * 0.25;
      d.y += d.vy;
      d.rot += 0.018;
      if (d.y >= floor - d.r * 0.35) {
        d.y = floor - d.r * 0.35;
        d.settled = true;
        d.vy = 0;
        d.vx *= 0.3;
      }
      const m = d.r + 4;
      if (d.x < m) d.x = m;
      if (d.x > W - m) d.x = W - m;
    } else {
      d.x += Math.sin(d.wobble) * 0.08;
    }
    if (d.popLife > 0) d.popLife--;
    if (d.scale > 1) d.scale = Math.max(1, d.scale - 0.06);
  }
}

function drawDebris() {
  for (const d of debrisList) {
    const t = DEBRIS_TYPES[d.typeIdx];
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot + Math.sin(d.wobble) * 0.06);
    ctx.scale(d.scale, d.scale);

    const alpha = d.settled ? 1 - (d.taps / DEBRIS_MAX_TAPS) * 0.35 : 0.92;
    ctx.globalAlpha = alpha;

    // Shadow on seafloor
    if (d.settled) {
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(0, d.r * 0.55, d.r * 0.75, d.r * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Sandy / rusty backing disc
    const bg = ctx.createRadialGradient(-4, -4, 2, 0, 0, d.r);
    bg.addColorStop(0, '#a08060');
    bg.addColorStop(1, '#5a4030');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(0, 0, d.r * 0.88, 0, Math.PI * 2);
    ctx.fill();

    // Emoji icon
    ctx.font = `${d.r * 1.05}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.emoji, 0, 0);

    // Tap counter (settled only)
    if (d.settled) {
      const left = DEBRIS_MAX_TAPS - d.taps;
      ctx.font = `bold ${Math.max(9, d.r * 0.34)}px sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = 'rgba(0,0,0,0.75)';
      ctx.lineWidth = 2.5;
      const label = `${left}×`;
      ctx.strokeText(label, 0, d.r * 0.72);
      ctx.fillText(label, 0, d.r * 0.72);
    }

    ctx.restore();
  }
}

function drawCoinParticles() {
  for (const p of coinParticles) {
    const a = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = `bold ${p.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (p.gold) {
      ctx.fillStyle = '#FFD700';
      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.lineWidth = 3;
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.restore();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.life--;
  }
  coinParticles = coinParticles.filter(p => p.life > 0);
}

// ═══════════════════════════════════════════════════════════════════
function addCreature(tier, x, y) {
  if (tier < 0 || tier >= TIERS.length) return;
  const margin = 50;
  const cx = (x !== undefined) ? x : margin + Math.random() * (W - margin * 2);
  const cy = (y !== undefined) ? y : H * 0.2 + Math.random() * (H * 0.6);
  creatures.push({
    id:      nextId++,
    tier,
    x: cx, y: cy,
    r:       tierRadius(tier),
    vx:      (Math.random() - 0.5) * 0.3,
    vy:      (Math.random() - 0.5) * 0.3,
    wobble:  Math.random() * Math.PI * 2,
    scale:   1,
  });

  // First time discovering this tier
  if (tier > 0 && !discovered.has(tier)) {
    const prevMaxZone = (maxDiscoveredTier > 0) ? zoneOf(maxDiscoveredTier) : -1;
    discovered.add(tier);
    if (tier > maxDiscoveredTier) maxDiscoveredTier = tier;
    const newZone = zoneOf(tier);
    if (newZone > prevMaxZone && tier > 1) {
      showZoneUnlock(newZone);
    }
    setTimeout(() => showDiscovery(tier), newZone > prevMaxZone && tier > 1 ? 1800 : 0);
  } else if (tier > maxDiscoveredTier) {
    maxDiscoveredTier = tier;
  }
  updateHUD();
}

// ═══════════════════════════════════════════════════════════════════
//  DRAWING – BACKGROUND
// ═══════════════════════════════════════════════════════════════════
// Background gradient interpolates between zones as max tier grows
function getZoneBg() {
  const z = maxDiscoveredTier > 0 ? zoneOf(Math.min(maxDiscoveredTier, 100)) : 0;
  const next = Math.min(z + 1, ZONES.length - 1);
  // Fractional position within zone
  const frac = maxDiscoveredTier > 0
    ? ((maxDiscoveredTier - 1) % 10) / 10
    : 0;
  return {
    top: lerpColor(ZONES[z].bgTop, ZONES[next].bgTop, frac),
    bot: lerpColor(ZONES[z].bgBot, ZONES[next].bgBot, frac),
  };
}

function lerpColor(a, b, t) {
  const n1 = parseInt(a.replace('#',''), 16);
  const n2 = parseInt(b.replace('#',''), 16);
  const r = Math.round(((n1>>16)&0xff) + (((n2>>16)&0xff) - ((n1>>16)&0xff)) * t);
  const g = Math.round(((n1>>8 )&0xff) + (((n2>>8 )&0xff) - ((n1>>8 )&0xff)) * t);
  const bl= Math.round((n1&0xff)      + ((n2&0xff)       - (n1&0xff))       * t);
  return `rgb(${r},${g},${bl})`;
}

let bgAnimT = 0; // for ray animation

function drawBackground() {
  bgAnimT += 0.008;
  const { top, bot } = getZoneBg();

  // Ocean gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Light rays (only in shallow zones)
  const rayAlpha = Math.max(0, 0.07 - maxDiscoveredTier * 0.0006);
  if (rayAlpha > 0.005) {
    ctx.save();
    for (let i = 0; i < 6; i++) {
      const x = W * (0.08 + i * 0.17) + Math.sin(bgAnimT + i) * 12;
      const rayGrad = ctx.createLinearGradient(x, 0, x + 35, H);
      rayGrad.addColorStop(0,   `rgba(100,200,255,${rayAlpha})`);
      rayGrad.addColorStop(1,   'rgba(100,200,255,0)');
      ctx.fillStyle = rayGrad;
      ctx.beginPath();
      ctx.moveTo(x - 10, 0);
      ctx.lineTo(x + 45, 0);
      ctx.lineTo(x + 75, H);
      ctx.lineTo(x + 18, H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // Bioluminescent sparkles for deep zones
  const bioAlpha = Math.max(0, (maxDiscoveredTier - 30) * 0.002);
  if (bioAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = bioAlpha;
    for (const b of bgBubbles) {
      const pulse = 0.5 + 0.5 * Math.sin(b.wobble * 1.3 + bgAnimT * 2);
      ctx.fillStyle = `hsl(${(b.wobble * 60 + bgAnimT * 20) % 360},100%,70%)`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * 0.3 * pulse, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Decorative floating bubbles
  for (const b of bgBubbles) {
    ctx.save();
    ctx.globalAlpha = b.alpha;
    ctx.strokeStyle = '#7ee8fa';
    ctx.lineWidth   = 1.2;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.27, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Seafloor
  ctx.save();
  ctx.fillStyle = lerpColor('#001428', '#010204', maxDiscoveredTier / 100);
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 38) {
    ctx.lineTo(x, H - 7 - Math.sin(x * 0.06 + bgAnimT * 0.3) * 5);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════
//  DRAWING – CREATURE
// ═══════════════════════════════════════════════════════════════════
function drawCreature(c) {
  const t = TIERS[c.tier];
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(c.scale, c.scale);

  if (c.tier === 0) {
    // Spawn bubble
    const pulse = 1 + 0.06 * Math.sin(c.wobble * 2);
    ctx.scale(pulse, pulse);
    const glow = ctx.createRadialGradient(0, 0, c.r * 0.3, 0, 0, c.r * 1.35);
    glow.addColorStop(0,   'rgba(150,230,255,0.16)');
    glow.addColorStop(1,   'rgba(100,180,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0, 0, c.r * 1.35, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(120,210,255,0.85)';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(-c.r * 0.28, -c.r * 0.28, c.r * 0.32, c.r * 0.2, -0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = `${c.r * 0.82}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(200,240,255,0.9)';
    ctx.fillText('🫧', 0, 0);
  } else {
    const r = c.r;
    // Outer glow for legendary tiers (91+)
    if (c.tier >= 91) {
      const zone   = ZONES[9];
      const glowR  = ctx.createRadialGradient(0, 0, r * 0.5, 0, 0, r * 1.6);
      glowR.addColorStop(0,   zone.color + '66');
      glowR.addColorStop(1,   'transparent');
      ctx.fillStyle = glowR;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.6, 0, Math.PI * 2); ctx.fill();
    }
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(2, r * 0.7, r * 0.68, r * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();
    // Body circle
    const bg = ctx.createRadialGradient(-r * 0.25, -r * 0.2, r * 0.1, 0, 0, r);
    bg.addColorStop(0, lighten(t.color, 45));
    bg.addColorStop(1, t.color);
    ctx.fillStyle   = bg;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Emoji
    ctx.font        = `${r * 1.05}px serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.emoji, 0, 0);
    // Coin badge
    const badge = `+${fmt(t.coins)}`;
    const fs    = Math.max(9, r * 0.36);
    ctx.font        = `bold ${fs}px sans-serif`;
    ctx.fillStyle   = '#FFD700';
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.lineWidth   = 3;
    ctx.strokeText(badge, r * 0.52, -r * 0.72);
    ctx.fillText(badge,   r * 0.52, -r * 0.72);
    // Tier badge (small bottom-right, for high tiers)
    if (c.tier >= 10) {
      const tierLabel = `T${c.tier}`;
      const tfs = Math.max(8, r * 0.3);
      ctx.font        = `bold ${tfs}px sans-serif`;
      ctx.fillStyle   = 'rgba(255,255,255,0.75)';
      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.lineWidth   = 2.5;
      ctx.strokeText(tierLabel, -r * 0.6, r * 0.72);
      ctx.fillText(tierLabel,   -r * 0.6, r * 0.72);
    }
  }
  ctx.restore();
}

// ── Merge flash effect
function drawMergeFlashes() {
  for (const f of mergeFlashes) {
    const alpha = f.life / 30;
    const r     = (1 - alpha) * 58;
    ctx.save();
    ctx.globalAlpha = alpha;
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
    g.addColorStop(0,   '#fff');
    g.addColorStop(0.35, f.color || '#1ac9e6');
    g.addColorStop(1,   'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ── Lighten colour helper
function lighten(hex, amount) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, ((n >> 16) & 0xff) + amount);
  const g = Math.min(255, ((n >> 8)  & 0xff) + amount);
  const b = Math.min(255, (n & 0xff)          + amount);
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════
let lastTime = 0;

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;

  // Background bubbles float upward
  for (const b of bgBubbles) {
    b.y      -= b.speed;
    b.x      += Math.sin(b.wobble) * 0.28;
    b.wobble += 0.014;
    if (b.y + b.r < 0) { b.y = H + b.r; b.x = Math.random() * W; }
  }

  // Creatures drift and bounce
  for (const c of creatures) {
    if (c === dragging) continue;
    c.wobble += 0.04;
    c.x += c.vx;
    c.y += c.vy;
    c.vx *= 0.98;
    c.vy *= 0.98;
    const m = c.r + 4;
    if (c.x < m)       { c.x = m;     c.vx =  Math.abs(c.vx) * 0.6; }
    if (c.x > W - m)   { c.x = W - m; c.vx = -Math.abs(c.vx) * 0.6; }
    if (c.y < m)       { c.y = m;     c.vy =  Math.abs(c.vy) * 0.6; }
    if (c.y > H - m)   { c.y = H - m; c.vy = -Math.abs(c.vy) * 0.6; }
    c.vx += (Math.random() - 0.5) * 0.014;
    c.vy += (Math.random() - 0.5) * 0.014;
    const maxV = 0.5;
    c.vx = Math.max(-maxV, Math.min(maxV, c.vx));
    c.vy = Math.max(-maxV, Math.min(maxV, c.vy));
  }

  // Scale pop decay
  for (const c of creatures) {
    if (c.scale > 1) c.scale = Math.max(1, c.scale - 0.05);
    if (c.scale < 1) c.scale = Math.min(1, c.scale + 0.05);
  }

  // Merge flash decay
  mergeFlashes = mergeFlashes.filter(f => { f.life--; return f.life > 0; });

  // Sinking debris
  updateDebris(dt);

  // Passive income (every 4 seconds, each creature earns 50% of click value)
  if (now - lastPassive > 4000) {
    lastPassive = now;
    let earned = 0;
    for (const c of creatures) {
      if (c.tier > 0) earned += Math.floor(TIERS[c.tier].coins * 0.5);
    }
    if (earned > 0) {
      coins += earned;
      updateHUD();
    }
  }

  // Draw everything
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawDebris();
  for (const c of creatures) {
    if (c !== dragging) drawCreature(c);
  }
  drawMergeFlashes();
  drawCoinParticles();
  if (dragging) {
    ctx.save(); ctx.globalAlpha = 0.88;
    drawCreature(dragging);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════════
function pointerPos(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const src    = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY,
  };
}

function hitCreature(px, py) {
  for (let i = creatures.length - 1; i >= 0; i--) {
    const c = creatures[i];
    if (Math.hypot(px - c.x, py - c.y) <= c.r * 1.1) return c;
  }
  return null;
}

let pointerDownTime   = 0;
let pointerDownTarget = null;
let debrisTapTarget   = null;
let pointerMoved      = false;

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('touchstart', onDown, { passive: false });

function onDown(e) {
  e.preventDefault();
  const { x, y } = pointerPos(e);
  pointerDownTime   = performance.now();
  pointerDownTarget = hitCreature(x, y);
  debrisTapTarget   = null;
  pointerMoved      = false;
  if (pointerDownTarget) {
    dragging    = pointerDownTarget;
    dragOffX    = x - dragging.x;
    dragOffY    = y - dragging.y;
    dragOriginX = dragging.x;
    dragOriginY = dragging.y;
    creatures   = creatures.filter(c => c !== dragging);
    creatures.push(dragging);
  } else {
    debrisTapTarget = hitDebris(x, y);
  }
}

canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('touchmove',  onMove, { passive: false });

function onMove(e) {
  e.preventDefault();
  if (!dragging) return;
  pointerMoved = true;
  const { x, y } = pointerPos(e);
  dragging.x = x - dragOffX;
  dragging.y = y - dragOffY;
}

canvas.addEventListener('mouseup',  onUp);
canvas.addEventListener('touchend', onUp);

function onUp(e) {
  const elapsed = performance.now() - pointerDownTime;

  // Tap settled debris (no creature drag)
  if (!dragging && debrisTapTarget && !pointerMoved && elapsed < 380) {
    handleDebrisTap(debrisTapTarget);
    debrisTapTarget = null;
    return;
  }

  if (!dragging) return;

  if (!pointerMoved && elapsed < 380) {
    handleTap(dragging);
    dragging.vx = 0;
    dragging.vy = 0;
    dragging = null;
    return;
  }

  // Drop — check for merge target
  const other = creatures.find(c => {
    if (c === dragging) return false;
    return Math.hypot(dragging.x - c.x, dragging.y - c.y) < dragging.r + c.r
        && c.tier === dragging.tier;
  });

  if (other && dragging.tier < TIERS.length - 1) {
    doMerge(dragging, other);
  } else {
    dragging.vx = (dragging.x - dragOriginX) * 0.05;
    dragging.vy = (dragging.y - dragOriginY) * 0.05;
  }
  dragging = null;
  debrisTapTarget = null;
  updateHUD();
}

// ═══════════════════════════════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════════════════════════════
function handleTap(c) {
  if (c.tier === 0) {
    // Hatch bubble → tier 1 Starfish
    c.tier   = 1;
    c.r      = tierRadius(1);
    c.scale  = 1.4;
    mergeFlashes.push({ x: c.x, y: c.y, life: 30, color: ZONES[0].color });
    showFloat(c.x, c.y, '🌟 New!');
    if (!discovered.has(1)) {
      discovered.add(1);
      maxDiscoveredTier = Math.max(maxDiscoveredTier, 1);
      showDiscovery(1);
    }
    updateHUD();
  } else {
    // Earn coins
    const earned = TIERS[c.tier].coins;
    coins  += earned;
    c.scale = 1.22;
    showFloat(c.x, c.y, `+${fmt(earned)}🪙`);
    updateHUD();
  }
}

function doMerge(a, b) {
  const newTier = a.tier + 1;
  const mx = (a.x + b.x) / 2;
  const my = (a.y + b.y) / 2;
  creatures = creatures.filter(c => c !== a && c !== b);
  const zoneColor = ZONES[Math.min(9, Math.floor((newTier - 1) / 10))].color;
  mergeFlashes.push({ x: mx, y: my, life: 30, color: zoneColor });
  // Track tiers unlocked for the marketplace (merge-only progression).
  mergedTiers.add(a.tier);
  mergedTiers.add(newTier);
  addCreature(newTier, mx, my);
  const newest = creatures[creatures.length - 1];
  if (newest) newest.scale = 1.5;
  showFloat(mx, my, '🎉 Merged!');
  updateHUD();
}

// ── Buy bubble button
document.getElementById('buy-btn').addEventListener('click', () => {
  const cost = bubbleCost();
  if (coins < cost) { showToast(`Need ${fmt(cost)}🪙 to buy a bubble!`); return; }
  coins -= cost;
  spawnStarterBubble();
  updateHUD();
});

// ═══════════════════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('coin-count').textContent = fmt(coins);

  const cost = bubbleCost();
  const btn  = document.getElementById('buy-btn');
  btn.querySelector('#buy-cost').textContent = `(${fmt(cost)}🪙)`;
  btn.classList.toggle('disabled', coins < cost);

  const seenTiers = [...discovered].filter(t => t > 0).length;
  document.getElementById('progress-label').textContent = `${seenTiers}/100`;
  document.getElementById('progress-bar-fill').style.width = `${seenTiers}%`;

  // Zone label shows zone of highest discovered creature
  const zIdx = maxDiscoveredTier > 0 ? zoneOf(maxDiscoveredTier) : 0;
  const zone = ZONES[zIdx];
  const zLabel = document.getElementById('zone-label');
  zLabel.textContent   = zone.name;
  zLabel.style.color   = zone.color;
  zLabel.style.textShadow = `0 0 8px ${zone.color}88`;

  // Keep marketplace affordability/lock states fresh while it is open.
  // Query the DOM directly so this works before `shopOverlay` is declared.
  const ov = document.getElementById('shop-overlay');
  if (ov && ov.classList.contains('show')) renderShop();
}
updateHUD();

// ═══════════════════════════════════════════════════════════════════
//  DISCOVERY POPUP
// ═══════════════════════════════════════════════════════════════════
let popupQueue = [];
let popupOpen  = false;

function showDiscovery(tier) {
  popupQueue.push(tier);
  if (!popupOpen) drainPopup();
}

function drainPopup() {
  if (popupQueue.length === 0) { popupOpen = false; return; }
  popupOpen = true;
  const tier = popupQueue.shift();
  const t    = TIERS[tier];
  const zIdx = t.zone;
  const zone = ZONES[zIdx];

  const zoneEl  = document.getElementById('popup-zone');
  zoneEl.textContent   = zone.name;
  zoneEl.style.background = zone.color + '30';
  zoneEl.style.color      = zone.color;
  zoneEl.style.border     = `1px solid ${zone.color}60`;

  document.getElementById('popup-tier').textContent = `Creature #${tier} of 100`;
  document.getElementById('popup-name').textContent = t.name;

  const box = document.getElementById('popup-creature');
  box.style.background = t.color + '50';
  box.style.border     = `3px solid ${t.color}`;
  box.textContent      = t.emoji;

  document.getElementById('popup-desc').textContent  = t.desc;
  document.getElementById('popup-coins').textContent =
    `+${fmt(t.coins)}🪙 per click  ·  +${fmt(Math.floor(t.coins * 0.5))}🪙 passive / 4s`;

  document.getElementById('popup-overlay').classList.add('show');
}

document.getElementById('popup-ok').addEventListener('click', () => {
  document.getElementById('popup-overlay').classList.remove('show');
  setTimeout(drainPopup, 200);
});

// ═══════════════════════════════════════════════════════════════════
//  ZONE UNLOCK BANNER
// ═══════════════════════════════════════════════════════════════════
let zubTimer = null;

function showZoneUnlock(zoneIdx) {
  const zone = ZONES[zoneIdx];
  const banner = document.getElementById('zone-unlock-banner');
  document.getElementById('zub-name').textContent = zone.name;
  banner.style.borderColor  = zone.color;
  banner.style.boxShadow    = `0 0 24px ${zone.color}80`;
  banner.classList.add('show');
  clearTimeout(zubTimer);
  zubTimer = setTimeout(() => banner.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════════════════════
//  FLOATING COIN TEXT
// ═══════════════════════════════════════════════════════════════════
function showFloat(cx, cy, text) {
  const el       = document.createElement('div');
  el.className   = 'float-text';
  el.textContent = text;
  const rect = canvas.getBoundingClientRect();
  el.style.left  = `${cx * (rect.width  / W) - 18}px`;
  el.style.top   = `${cy * (rect.height / H) - 8}px`;
  wrap.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ═══════════════════════════════════════════════════════════════════
//  MARKETPLACE  ("Buy Creatures")
//  Buy lower-tier helpers to speed up merging. Higher tiers can ONLY
//  be obtained by merging on the board — never from the shop.
//
//  ── VISIBILITY RULES ─────────────────────────────────────────────
//    1. A creature appears only after you merge it (or merge two of
//       the tier below to create it).
//    2. Undiscovered / current-best creatures are hidden — not shown.
//    3. You can only buy tiers strictly below your current best.
//
//  ── PRICE TREND LINE ─────────────────────────────────────────────
//    basePrice(tier) = round( 35 × tier^1.9 )
//    price(tier)     = basePrice × 1.18^owned
// ═══════════════════════════════════════════════════════════════════
const SHOP_GROWTH  = 1.18;
const shopBought   = {};

function shopBasePrice(tier) { return Math.round(35 * Math.pow(tier, 1.9)); }
function shopPrice(tier) {
  const owned = shopBought[tier] || 0;
  return Math.round(shopBasePrice(tier) * Math.pow(SHOP_GROWTH, owned));
}

// Tiers eligible to appear in the shop grid.
function shopVisibleTiers() {
  return [...mergedTiers]
    .filter(t => t > 0 && t < maxDiscoveredTier)
    .sort((a, b) => a - b);
}
function canBuyInShop(tier) {
  return mergedTiers.has(tier) && tier > 0 && tier < maxDiscoveredTier;
}

function passivePerSec(tier) {
  return Math.max(1, Math.round(TIERS[tier].coins * 0.5 / 4));
}

// Spawn a shop purchase on the board without advancing discovery.
function placePurchasedCreature(tier) {
  const margin = 50;
  creatures.push({
    id:      nextId++,
    tier,
    x:       margin + Math.random() * (W - margin * 2),
    y:       H * 0.2 + Math.random() * (H * 0.6),
    r:       tierRadius(tier),
    vx:      (Math.random() - 0.5) * 0.3,
    vy:      (Math.random() - 0.5) * 0.3,
    wobble:  Math.random() * Math.PI * 2,
    scale:   1,
  });
}

const shopOverlay = document.getElementById('shop-overlay');
const shopGrid    = document.getElementById('shop-grid');

function openShop()  { renderShop(); shopOverlay.classList.add('show'); }
function closeShop() { shopOverlay.classList.remove('show'); }

document.getElementById('shop-btn').addEventListener('click', openShop);
document.getElementById('shop-close').addEventListener('click', closeShop);
shopOverlay.addEventListener('click', (e) => {
  if (e.target === shopOverlay) closeShop();
});

function renderShop() {
  document.getElementById('shop-subtitle').textContent =
    'Buy lower-tier helpers you unlocked by merging';
  shopGrid.innerHTML = '';

  const tiers = shopVisibleTiers();
  if (tiers.length === 0) {
    shopGrid.innerHTML =
      `<div id="shop-empty">` +
        `<div class="shop-empty-icon">🫧</div>` +
        `Merge creatures on the board to unlock helpers here.<br>` +
        `Only tiers below your current best can be bought.` +
      `</div>`;
    return;
  }

  for (const tier of tiers) {
    const t = TIERS[tier];
    const price      = shopPrice(tier);
    const affordable = coins >= price;
    const slot       = document.createElement('div');
    slot.className   = 'shop-slot ' + (affordable ? 'affordable' : 'cant-afford');
    slot.innerHTML =
      `<div class="hex">${t.emoji}</div>` +
      `<div class="shop-card">` +
        `<div class="shop-name">${t.name}</div>` +
        `<div class="shop-price">🪙 ${fmt(price)}</div>` +
        `<div class="shop-foot">` +
          `<span>Owned: ${shopBought[tier] || 0}</span>` +
          `<span class="passive">+${fmt(passivePerSec(tier))}/sec</span>` +
        `</div>` +
      `</div>`;
    slot.querySelector('.shop-price').addEventListener('click', () => buyCreature(tier));
    shopGrid.appendChild(slot);
  }
}

function buyCreature(tier) {
  if (!canBuyInShop(tier)) return;
  const price = shopPrice(tier);
  if (coins < price) {
    showToast(`Need ${fmt(price)}🪙 for a ${TIERS[tier].name}!`);
    return;
  }
  coins -= price;
  shopBought[tier] = (shopBought[tier] || 0) + 1;
  placePurchasedCreature(tier);
  const nc = creatures[creatures.length - 1];
  if (nc) {
    nc.scale = 1.5;
    mergeFlashes.push({ x: nc.x, y: nc.y, life: 30,
      color: ZONES[t_zone(tier)].color });
  }
  showToast(`Bought a ${TIERS[tier].name}! 🎉`);
  updateHUD();
  renderShop();
}

// Helper: zone index for a tier (named to avoid clashing with zoneOf use above)
function t_zone(tier) { return TIERS[tier].zone; }

// ═══════════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
